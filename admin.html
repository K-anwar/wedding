<!DOCTYPE html>
<html>
<head>
<title>Admin RSVP</title>
<script src="data.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}
.card {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}
</style>

</head>
<body>

<h2>Dashboard RSVP</h2>
<div id="data"></div>

<script>
const SCRIPT_URL = DATA.config.scriptURL;

function escapeHTML(str){
  return String(str).replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  })[m]);
}

async function loadData(){
  document.getElementById("data").innerHTML = "Loading...";
  try {
    const res = await fetch(SCRIPT_URL);
    if(!res.ok) throw new Error();

    let data = await res.json();

    const container = document.getElementById("data");

    let html = "";

    data.reverse().forEach(item => {
      html += `
        <div class="card">
          <b>${escapeHTML(item.nama)}</b> (${escapeHTML(item.status)})
          <br>${escapeHTML(item.ucapan)}
        </div>
      `;
    });

    container.innerHTML = html;

  } catch {
    document.getElementById("data").innerHTML = "Gagal load data ❌";
  }
}

loadData();
let adminInterval;

function startAdminRefresh(){
  if(adminInterval) return;

  adminInterval = setInterval(loadData, 5000);
}

function stopAdminRefresh(){
  clearInterval(adminInterval);
  adminInterval = null;
}

document.addEventListener("visibilitychange", () => {
  if(document.hidden){
    stopAdminRefresh();
  } else {
    startAdminRefresh();
  }
});

startAdminRefresh();
</script>

</body>
</html>
